<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .apology-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .heart {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .apology-text {
            color: #34495e;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            white-space: pre-line;
        }

        .signature {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .edit-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="apology-container">
        <div class="heart">👸</div>
        <h1>I'm Truly Sorry</h1>
        <div class="apology-text" id="apologyText">
            Dear zy,

           IM SO SORRY NA MY LOVEE POO I KNOW YOUR MAD AT ME SORRY NA PO KAYO LOVEE DONT BE MAD NA POO PLEASEE
            I love YOUU PO,
        </div>
        <button class="edit-btn" onclick="editApology()">✏️ Edit My Apology</button>
        <div class="signature" id="signature">
            SETH KO
        </div>
    </div>

    <script>
        function editApology() {
            const text = prompt('Enter your apology message:', document.getElementById('apologyText').textContent);
            const name = prompt('Enter the recipient name:', '[Name]');
            const signature = prompt('Enter your name:', '[Your Name]');
            
            if (text !== null) {
                document.getElementById('apologyText').textContent = text;
            }
            if (name !== null) {
                document.getElementById('apologyText').innerHTML = 
                    document.getElementById('apologyText').textContent.replace('[Name]', name);
            }
            if (signature !== null) {
                document.getElementById('signature').textContent = signature;
            }
        }

        // Make it printable
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') {
                document.body.style.background = 'white';
                document.querySelector('.apology-container').style.background = 'white';
            }
        });
    </script>
</body>
</html>
